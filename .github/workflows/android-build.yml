name: Android Build

# Builds a signed release APK and AAB for BottleMark and uploads them as
# workflow artifacts. No emulator smoke-test runs here (kept fast for free
# runners); launch verification is done locally per the README checklist.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      BOTTLEMARK_UPLOAD_STORE_FILE: ${{ github.workspace }}/bottlemark-release-key.p12
      BOTTLEMARK_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      BOTTLEMARK_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      BOTTLEMARK_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35 & Build Tools 35.0.0
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm install

      - name: Align Expo dependency versions
        run: npx expo install --fix

      - name: Run Expo Doctor
        run: npx expo-doctor || true

      - name: Check dependency versions
        run: npx expo install --check || true

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$BOTTLEMARK_UPLOAD_STORE_FILE"

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install

      - name: Copy ProGuard rules
        run: |
          if [ -f proguard-rules.pro ]; then
            cp proguard-rules.pro android/app/proguard-rules.pro
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Build release AAB
        working-directory: android
        run: ./gradlew :app:bundleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bottlemark-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bottlemark-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
